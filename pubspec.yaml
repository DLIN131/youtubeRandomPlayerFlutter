name: youtube_random_player_flutter_bg
description: Flutter rewrite of Youtube Random Player with background playback
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  youtube_explode_dart: ^3.0.5
  youtube_player_iframe: ^5.2.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "assets/icon.png"
  adaptive_icon_foreground: "assets/transparent.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
